server:
  port: ${sp.student}
spring:
  application:
    name: ${sn.student}
seata:
  tx-service-group: tx-business
  enabled: false
# 如需启用seata将enabled改为true即可
  service:
    #seata服务地址
    grouplist:
      default: 127.0.0.1:8888
    #虚拟组和分组映射，key的名字与tx-service-group一致
    vgroup-mapping:
      tx-business: default
    #开启全局事务
    disable-global-transaction: false
